$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
name: training-defectsense

description: Train a PaDiM anomaly detection model on images
display_name: Train PaDiM Model
experiment_name: padim_anomaly_detection_experiment

code: ../src
command: >
  conda run -n defectsense_env python train.py
  --dataset_path ${{inputs.dataset_path}}
  --test_dataset_path ${{inputs.test_dataset_path}}
  --output_model ${{outputs.model_output}}
  --evaluate_model
  --generate_baseline
  --baseline_output_path ${{outputs.baseline_reference}}

environment: azureml:defectsense_env:1



inputs:
  dataset_path:
    type: uri_folder
    path: azureml:anomaly-images:1  # ← from DATASET_NAME

  test_dataset_path:
    type: uri_folder
    path: azureml:anomaly-images:1


outputs:
  model_output:
    type: uri_folder
    mode: rw_mount
    # path: azureml://datastores/workspaceblobstore/paths/models/defectsense/

  baseline_reference:
    type: uri_file
    mode: upload

compute: azureml:compute-defectsense  # ← from COMPUTE_NAME

# to avoid Met error <class 'KeyError'>:'mlflow.source.git.branch'

properties:
  mlflow.source.git.branch: ""
  mlflow.source.git.repo: ""
  mlflow.source.git.commit: ""
