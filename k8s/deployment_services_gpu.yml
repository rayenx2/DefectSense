apiVersion: apps/v1
kind: Deployment
metadata:
  name: defectsense-deploy
  labels:
    app: defectsense
    type: FastAPI
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defectsense
      type: FastAPI
  template:
    metadata:
      name: defectsense-repl
      labels:
        app: defectsense
        type: FastAPI
    spec:
      containers:
      - name: defectsense
        image: acrdefectsense.azurecr.io/fastapi-defectsense:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            nvidia.com/gpu: 1  # Request 1 GPU
          limits:
            nvidia.com/gpu: 1  # Limit to 1 GPU
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
      imagePullSecrets:
      - name: acr-secret
      # Add toleration if GPU nodes have taints
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      # Optional: Node selector to ensure pod runs on GPU nodes
      nodeSelector:
        accelerator: nvidia-tesla-v100
---
apiVersion: v1
kind: Service
metadata:
  name: defectsense-service
  labels:
    app: defectsense
    type: FastAPI
spec:
  selector:
    app: defectsense
    type: FastAPI
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer  # or ClusterIP for internal access