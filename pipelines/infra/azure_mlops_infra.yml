trigger:
  paths:
    include:
      - infra/

pool:
  name: Default

variables:
  - group: mlops-azure-components

stages:
  - stage: BootstrapAzureMLInfra
    displayName: Provision Azure ML Infrastructure
    jobs:
      - job: InstallAzureMLExtension
        displayName: "Install ML Extension"
        steps:
          - checkout: none
          - template: templates/install_azureml_extension.yml

      - job: CreateResourceGroup
        displayName: "Create RG"
        dependsOn: InstallAzureMLExtension
        steps:
          - checkout: none
          - template: templates/create_resource_group.yml

      - job: CreateWorkspace
        displayName: "Create AML Workspace"
        dependsOn: CreateResourceGroup
        steps:
          - checkout: none
          - template: templates/create_workspace.yml

      - job: CreateComputeCluster
        displayName: "Setup Compute"
        dependsOn: CreateWorkspace
        steps:
          - checkout: none
          - template: templates/create_compute_cluster.yml

      - job: UploadDataset
        displayName: "Data Ingestion"
        dependsOn: CreateComputeCluster
        steps:
          - checkout: none
          - template: templates/upload_dataset.yml

      - job: RegisterEnvironment
        displayName: "Register ML Environment"
        dependsOn: UploadDataset
        steps:
          - checkout: none
          - template: templates/register_env.yml



