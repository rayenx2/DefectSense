trigger:
  branches:
    include:
      - main

variables:
  - group: github_Credi

stages:
- stage: SyncToGitHub
  displayName: 'Sync Azure DevOps Repo to GitHub'
  jobs:
  - job: MirrorJob
    displayName: 'Mirror to GitHub'
    pool:
      name: Default
    steps:
    - checkout: self
      clean: true
      fetchDepth: 0   # IMPORTANT: full history

    - script: |
        echo "== Git diagnostics =="
        git --version
        git rev-parse --is-shallow-repository
        git log -1 --oneline

        echo "== Configure/repair remote =="
        git remote remove github 2>nul || echo "remote github did not exist"
        git remote add github https://$(GITHUB_PAT)@github.com/rayenx2/$(Build.Repository.Name).git
        git remote -v

        echo "== Optional: reduce push pain on big repos =="
        git config http.postBuffer 524288000
        git config core.compression 0

        echo "== Push =="
        git push github HEAD:main --force
      displayName: 'Push to GitHub'
